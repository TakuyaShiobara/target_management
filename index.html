<style>
  :root{
    --bg:#f3f6fb;
    --card:#ffffff;
    --card-2:#f6f9fd;
    --line:#dfe6f0;
    --blue:#2563eb;
    --blue-soft:#eaf1fd;
    --blue-dim:#9db8e8;
    --blue-deep:#1d4ed8;
    --green:#16a34a;
    --green-soft:#e8f6ee;
    --red:#dc2626;
    --ink:#1a2333;
    --ink-soft:#5b6577;
    --ink-faint:#9aa4b5;
    --font-b:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-b);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  button{font-family:inherit;}
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding:max(22px,env(safe-area-inset-top)) 18px max(32px,env(safe-area-inset-bottom));
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .loading{padding:80px 0;text-align:center;color:var(--ink-soft);font-size:14px;letter-spacing:.05em;}

  /* header */
  .head{text-align:center;padding:4px 0 2px;}
  .eyebrow{font-size:11px;letter-spacing:.28em;color:var(--blue);font-weight:700;}
  .head h1{margin:6px 0 0;font-weight:800;font-size:21px;color:var(--ink);letter-spacing:.01em;}
  .head .rule{width:46px;height:2px;background:var(--blue);border-radius:2px;margin:10px auto 0;opacity:.55;}

  /* scope tabs */
  .tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;box-shadow:0 1px 2px rgba(20,30,60,.04);}
  .tab{flex:1;text-align:center;padding:11px 0;border-radius:9px;font-weight:700;font-size:14px;color:var(--ink-soft);cursor:pointer;transition:background .15s,color .15s;}
  .tab.active{background:var(--blue);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.28);}

  /* stat plaque */
  .stat-plaque{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 18px 16px;display:flex;flex-direction:column;gap:12px;box-shadow:0 1px 3px rgba(20,30,60,.05);}
  .stat-top{display:flex;align-items:baseline;gap:10px;}
  .stat-num{font-size:38px;font-weight:800;color:var(--blue);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  .stat-label{font-size:12px;color:var(--ink-soft);letter-spacing:.04em;}
  .dotrow{display:flex;gap:5px;flex-wrap:wrap;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line);}
  .dot.on{background:var(--green);}
  .stat-sub{font-size:12.5px;color:var(--ink-soft);display:flex;gap:14px;flex-wrap:wrap;font-variant-numeric:tabular-nums;}

  /* category tabs */
  .cat-tabs-row{display:flex;align-items:center;gap:8px;}
  .cat-tabs{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;padding-bottom:2px;}
  .cat-tabs::-webkit-scrollbar{display:none;}
  .cat-pill{flex:0 0 auto;display:flex;align-items:center;gap:5px;padding:9px 15px;border-radius:999px;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);font-size:13.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .cat-pill.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .pill-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
  .cat-pill.active .pill-dot{background:#fff;}
  .cat-manage-btn{flex:0 0 auto;background:none;border:none;color:var(--blue);font-size:13px;font-weight:700;cursor:pointer;padding:8px 4px;}

  /* board */
  .cat-board-header{display:flex;align-items:center;justify-content:space-between;padding:0 2px;}
  .cat-board-title{font-size:15px;font-weight:800;color:var(--ink);}
  .line-status{font-size:12.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
  .board-wrap{display:flex;justify-content:center;}
  .board{
    width:100%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    gap:8px;
    aspect-ratio:1/1;
    padding:14px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:0 1px 3px rgba(20,30,60,.05);
  }
  .cell{
    position:relative;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:8px 6px;
    font-size:13px;
    line-height:1.3;
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--card-2);
    color:var(--ink);
    overflow:hidden;
  }
  .cell:focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
  .cell.center{
    background:var(--blue-soft);
    border-color:var(--blue-dim);
    color:var(--blue-deep);
    font-weight:800;
    font-size:13.5px;
  }
  .cell.achieved{background:var(--green-soft);border-color:var(--green);}
  .cell .ph{color:var(--ink-faint);font-style:normal;font-weight:400;}
  .cell-text{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden;}
  .pencil{
    position:absolute;top:4px;right:5px;
    width:18px;height:18px;border-radius:6px;
    border:none;background:rgba(26,35,51,.06);
    color:var(--ink-soft);font-size:10px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .pencil:focus-visible{outline:2px solid var(--blue);}
  .stamp-mark{
    position:absolute;bottom:5px;right:5px;
    border:1.5px solid var(--green);
    color:var(--green);
    font-weight:700;
    font-size:9px;
    padding:1px 6px;
    border-radius:20px;
    background:#fff;
    letter-spacing:.02em;
    pointer-events:none;
  }

  /* category overview list */
  .cat-list-wrap{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 1px 3px rgba(20,30,60,.05);}
  .cat-list-title{font-size:11px;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:10px;}
  .cat-list{display:flex;flex-direction:column;gap:8px;}
  .cat-card{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 13px;border-radius:11px;background:var(--card-2);border:1px solid var(--line);cursor:pointer;}
  .cat-card.active{border-color:var(--blue);background:var(--blue-soft);}
  .cat-card-main{min-width:0;flex:1;}
  .cat-card-name{font-size:13.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:6px;}
  .cat-card-badge{font-size:10px;font-weight:700;color:var(--green);border:1px solid var(--green);border-radius:20px;padding:0 6px;}
  .cat-card-goal{font-size:12px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cat-card-progress{font-size:13px;font-weight:700;color:var(--blue);font-variant-numeric:tabular-nums;flex:0 0 auto;}
  .empty-cats{text-align:center;color:var(--ink-soft);font-size:13px;padding:30px 0;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(20,30,50,.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:24px;}
  .modal{width:100%;max-width:340px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;display:flex;flex-direction:column;gap:14px;box-shadow:0 12px 32px rgba(20,30,60,.18);}
  .modal.modal-wide{max-width:360px;}
  .modal h3{margin:0;font-size:16px;color:var(--ink);font-weight:800;}
  .modal input{background:var(--card-2);border:1px solid var(--line);border-radius:9px;padding:13px 14px;color:var(--ink);font-size:15px;font-family:var(--font-b);width:100%;}
  .modal input:focus{outline:2px solid var(--blue);outline-offset:1px;}
  .modal-actions{display:flex;gap:10px;}
  .btn{flex:1;padding:12px 0;border-radius:9px;border:1px solid var(--line);background:var(--card-2);color:var(--ink);font-weight:700;font-size:14px;cursor:pointer;}
  .btn:focus-visible{outline:2px solid var(--blue);}
  .btn.primary{background:var(--blue);color:#fff;border-color:transparent;}
  .btn-text{background:none;border:none;color:var(--ink-soft);font-size:12.5px;text-align:center;padding:2px;cursor:pointer;text-decoration:underline;text-decoration-color:var(--line);}

  .cat-manage-list{display:flex;flex-direction:column;gap:8px;max-height:240px;overflow-y:auto;}
  .cat-manage-row{display:flex;gap:8px;align-items:center;}
  .cat-manage-row input{flex:1;}
  .cat-manage-del{flex:0 0 auto;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--card-2);color:var(--red);font-size:14px;cursor:pointer;}
  .cat-manage-add{display:flex;gap:8px;align-items:center;border-top:1px solid var(--line);padding-top:12px;}
  .cat-manage-add input{flex:1;}
  .btn-small{flex:0 0 auto;padding:11px 14px;border-radius:9px;border:none;background:var(--blue);color:#fff;font-weight:700;font-size:13px;cursor:pointer;}

  /* fx */
  #fx-layer{position:fixed;inset:0;pointer-events:none;z-index:80;overflow:hidden;}
  .stamp-pop{
    position:absolute;top:42%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    border:2px solid var(--green);color:var(--green);
    font-weight:800;
    padding:12px 26px;border-radius:14px;
    background:#fff;
    box-shadow:0 8px 28px rgba(22,163,74,.22);
    white-space:nowrap;
    animation:stampIn .45s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  .stamp-pop.big{font-size:20px;padding:16px 30px;}
  .stamp-pop.small{font-size:15px;}
  .stamp-pop.grand{font-size:24px;padding:20px 32px;border-width:3px;}
  .stamp-pop.fadeout{animation:stampOut .4s ease forwards;}
  .stamp-pop.reduced{animation:none;transform:translate(-50%,-50%) scale(1);opacity:1;}
  .stamp-pop.reduced.fadeout{animation:fadeOnly .4s ease forwards;}
  @keyframes stampIn{0%{transform:translate(-50%,-50%) scale(1.7);opacity:0;}60%{transform:translate(-50%,-50%) scale(.94);opacity:1;}100%{transform:translate(-50%,-50%) scale(1);opacity:1;}}
  @keyframes stampOut{to{opacity:0;transform:translate(-50%,-50%) scale(.9);}}
  @keyframes fadeOnly{to{opacity:0;}}
  .confetti{position:absolute;width:7px;height:7px;top:-20px;border-radius:50%;box-shadow:0 0 6px rgba(37,99,235,.25);animation-name:fall;animation-timing-function:cubic-bezier(.3,.6,.4,1);animation-fill-mode:forwards;}
  @keyframes fall{to{transform:translateY(var(--fall-y)) rotate(var(--rot));opacity:0;}}

  @media (prefers-reduced-motion:reduce){
    .confetti{display:none;}
  }
</style>
</head>
<body>
  <div id="app"><div class="loading">読み込み中…</div></div>
  <div id="fx-layer"></div>

<script>
(function(){
  "use strict";

  var OUTER = [0,1,2,3,5,6,7,8];
  var LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function idxOfPos(pos){ return OUTER.indexOf(pos); }

  function defaultCategoryData(){
    return { goal: '', items: new Array(8).fill(''), done: new Array(8).fill(false) };
  }
  function defaultCategorySet(){
    return [
      {id:'cat_work', name:'仕事'},
      {id:'cat_private', name:'プライベート'},
      {id:'cat_hobby', name:'趣味'}
    ];
  }
  function defaultScopeState(){
    var cats = defaultCategorySet();
    var catData = {};
    cats.forEach(function(c){ catData[c.id] = defaultCategoryData(); });
    return { categories: cats, catData: catData };
  }
  function defaultState(){
    return { data: { lifetime: defaultScopeState(), annual: defaultScopeState() } };
  }
  // migrate the old shape (one shared category list reused by both scopes)
  // into the new shape (each scope keeps its own independent category list).
  function migrateOldState(old){
    var ns = { data: { lifetime: {categories:[], catData:{}}, annual: {categories:[], catData:{}} } };
    ['lifetime','annual'].forEach(function(scope){
      var cats = (old.categories || []).map(function(c){ return {id:c.id, name:c.name}; });
      var catData = {};
      (old.categories || []).forEach(function(c){
        var existing = (old.data && old.data[scope]) ? old.data[scope][c.id] : null;
        catData[c.id] = existing || defaultCategoryData();
      });
      ns.data[scope] = { categories: cats, catData: catData };
    });
    return ns;
  }

  var state = null;
  var activeScope = 'lifetime';
  var activeCatByScope = { lifetime: null, annual: null };
  var editing = null;

  function getScopeCategories(scope){ return state.data[scope].categories; }
  function getCatData(scope, catId){
    var sd = state.data[scope];
    if (!sd.catData[catId]) sd.catData[catId] = defaultCategoryData();
    return sd.catData[catId];
  }
  function getActiveCat(){
    var cats = getScopeCategories(activeScope);
    var cur = activeCatByScope[activeScope];
    if (cur && cats.some(function(c){ return c.id===cur; })) return cur;
    var first = cats[0];
    activeCatByScope[activeScope] = first ? first.id : null;
    return activeCatByScope[activeScope];
  }
  function addCategory(name){
    var id = 'cat_' + Date.now() + '_' + Math.floor(Math.random()*1000);
    var sd = state.data[activeScope];
    sd.categories.push({id:id, name:name});
    sd.catData[id] = defaultCategoryData();
    persist();
  }
  function deleteCategory(id){
    var sd = state.data[activeScope];
    if (sd.categories.length<=1) return;
    sd.categories = sd.categories.filter(function(c){ return c.id!==id; });
    delete sd.catData[id];
    if (activeCatByScope[activeScope]===id) activeCatByScope[activeScope]=null;
    persist();
  }

  function achievedMapFromData(d){
    var map = {4:true};
    OUTER.forEach(function(pos){ var idx=idxOfPos(pos); map[pos] = !!d.done[idx]; });
    return map;
  }
  function countLines(map){
    return LINES.filter(function(line){ return line.every(function(p){ return map[p]; }); }).length;
  }
  function catFullyDone(d){ return d.done.every(Boolean); }

  async function persist(){
    try{ localStorage.setItem('mandala_state_v2', JSON.stringify(state)); }
    catch(e){ console.error('保存に失敗しました', e); }
  }
  async function loadState(){
    try{
      var raw = localStorage.getItem('mandala_state_v2');
      if (raw){
        var parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.categories)){
          state = migrateOldState(parsed);
          persist();
        } else if (parsed && parsed.data){
          state = parsed;
        } else {
          state = defaultState();
        }
      } else {
        state = defaultState();
      }
    }catch(e){ state = defaultState(); }

    if (!state || !state.data) state = defaultState();
    ['lifetime','annual'].forEach(function(scope){
      if (!state.data[scope]) state.data[scope] = defaultScopeState();
      if (!state.data[scope].categories || !state.data[scope].categories.length) state.data[scope].categories = defaultCategorySet();
      if (!state.data[scope].catData) state.data[scope].catData = {};
      state.data[scope].categories.forEach(function(c){
        if (!state.data[scope].catData[c.id]) state.data[scope].catData[c.id] = defaultCategoryData();
      });
    });
  }

  function esc(str){
    return (str || '').replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function renderHeader(){
    return '<header class="head">' +
      '<div class="eyebrow">目標盤</div>' +
      '<h1>マンダラチャート</h1>' +
      '<div class="rule"></div>' +
      '</header>';
  }
  function renderScopeTabs(){
    return '<div class="tabs">' +
      '<div class="tab ' + (activeScope==='lifetime'?'active':'') + '" data-action="switch-scope" data-scope="lifetime">生涯</div>' +
      '<div class="tab ' + (activeScope==='annual'?'active':'') + '" data-action="switch-scope" data-scope="annual">今年</div>' +
      '</div>';
  }
  function aggregateStats(scope){
    var cats = getScopeCategories(scope);
    var totalFilled=0, totalDone=0;
    cats.forEach(function(c){
      var d = getCatData(scope, c.id);
      totalFilled += d.items.filter(function(t){ return t && t.trim(); }).length;
      totalDone += d.done.filter(Boolean).length;
    });
    var catsAchieved = cats.filter(function(c){ return catFullyDone(getCatData(scope, c.id)); }).length;
    var pct = totalFilled ? Math.round(totalDone/totalFilled*100) : 0;
    return {pct:pct, totalDone:totalDone, totalFilled:totalFilled, catsAchieved:catsAchieved, totalCats: cats.length};
  }
  function renderStats(scope){
    var s = aggregateStats(scope);
    var dots = getScopeCategories(scope).map(function(c){
      return '<span class="dot ' + (catFullyDone(getCatData(scope,c.id))?'on':'') + '"></span>';
    }).join('');
    return '<div class="stat-plaque">' +
      '<div class="stat-top">' +
        '<div class="stat-num">' + s.pct + '%</div>' +
        '<div class="stat-label">達成率</div>' +
      '</div>' +
      '<div class="dotrow">' + dots + '</div>' +
      '<div class="stat-sub">' +
        '<span>カテゴリ ' + s.catsAchieved + '/' + s.totalCats + ' 達成</span>' +
        '<span>アクション ' + s.totalDone + '/' + s.totalFilled + '</span>' +
      '</div>' +
    '</div>';
  }
  function renderCategoryTabs(){
    var activeCat = getActiveCat();
    var pills = getScopeCategories(activeScope).map(function(c){
      var d = getCatData(activeScope, c.id);
      var full = catFullyDone(d);
      return '<div class="cat-pill ' + (c.id===activeCat?'active':'') + '" data-action="switch-cat" data-cat="' + c.id + '">' +
        (full ? '<span class="pill-dot"></span>' : '') + esc(c.name) +
      '</div>';
    }).join('');
    return '<div class="cat-tabs-row">' +
      '<div class="cat-tabs">' + pills + '</div>' +
      '<button class="cat-manage-btn" data-action="open-cat-manage">編集</button>' +
    '</div>';
  }
  function renderBoard(scope, catId){
    var cat = getScopeCategories(scope).filter(function(c){ return c.id===catId; })[0];
    var d = getCatData(scope, catId);
    var lines = countLines(achievedMapFromData(d));
    var cells = '';
    for (var pos=0; pos<9; pos++){
      if (pos===4){
        var g = d.goal ? esc(d.goal) : '<span class="ph">タップして<br>目標を設定</span>';
        cells += '<div class="cell center" data-action="edit-goal" data-cat="' + catId + '" tabindex="0">' + g + '</div>';
      } else {
        var idx = idxOfPos(pos);
        var text = d.items[idx];
        var isDone = d.done[idx];
        cells += '<div class="cell item ' + (text?'filled':'empty') + (isDone?' achieved':'') + '" data-action="item-cell" data-cat="' + catId + '" data-idx="' + idx + '" tabindex="0">' +
          (text ? '<button class="pencil" data-action="edit-item" data-cat="' + catId + '" data-idx="' + idx + '" aria-label="編集">✎</button>' : '') +
          '<div class="cell-text">' + (text ? esc(text) : '<span class="ph">タップして<br>設定</span>') + '</div>' +
          (isDone ? '<div class="stamp-mark">済</div>' : '') +
        '</div>';
      }
    }
    return '<div class="cat-board-header">' +
        '<div class="cat-board-title">' + (cat?esc(cat.name):'') + '</div>' +
        '<div class="line-status">ライン ' + lines + '/8</div>' +
      '</div>' +
      '<div class="board-wrap"><div class="board">' + cells + '</div></div>';
  }
  function renderCategoryList(scope){
    var activeCat = getActiveCat();
    var rows = getScopeCategories(scope).map(function(c){
      var d = getCatData(scope, c.id);
      var done = d.done.filter(Boolean).length;
      var full = catFullyDone(d);
      return '<div class="cat-card ' + (c.id===activeCat?'active':'') + '" data-action="switch-cat" data-cat="' + c.id + '">' +
        '<div class="cat-card-main">' +
          '<div class="cat-card-name">' + esc(c.name) + (full?'<span class="cat-card-badge">済</span>':'') + '</div>' +
          '<div class="cat-card-goal">' + (d.goal ? esc(d.goal) : '目標未設定') + '</div>' +
        '</div>' +
        '<div class="cat-card-progress">' + done + '/8</div>' +
      '</div>';
    }).join('');
    return '<div class="cat-list-wrap"><div class="cat-list-title">カテゴリ一覧</div><div class="cat-list">' + rows + '</div></div>';
  }

  function getEditorValue(){
    if (editing.type==='goal') return getCatData(activeScope, editing.cat).goal;
    if (editing.type==='item') return getCatData(activeScope, editing.cat).items[editing.idx];
    return '';
  }
  function getEditorTitle(){
    if (editing.type==='goal') return 'カテゴリの目標';
    if (editing.type==='item') return 'アクション';
    return '';
  }
  function renderCatManageModal(){
    var rows = getScopeCategories(activeScope).map(function(c){
      return '<div class="cat-manage-row">' +
        '<input data-cat-input="' + c.id + '" value="' + esc(c.name) + '" maxlength="10" />' +
        '<button class="cat-manage-del" data-action="delete-cat" data-cat="' + c.id + '" aria-label="削除">✕</button>' +
      '</div>';
    }).join('');
    return '<div class="modal-overlay">' +
      '<div class="modal modal-wide">' +
        '<h3>カテゴリを編集</h3>' +
        '<div class="cat-manage-list">' + rows + '</div>' +
        '<div class="cat-manage-add">' +
          '<input id="new-cat-input" type="text" maxlength="10" placeholder="新しいカテゴリ名" />' +
          '<button class="btn-small" data-action="add-cat">追加</button>' +
        '</div>' +
        '<div class="modal-actions">' +
          '<button class="btn primary" data-action="cat-manage-done">完了</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }
  function renderModal(){
    if (!editing) return '';
    if (editing.type==='cat-manage') return renderCatManageModal();
    var val = esc(getEditorValue());
    var title = getEditorTitle();
    var showClear = !!getEditorValue();
    return '<div class="modal-overlay">' +
      '<div class="modal">' +
        '<h3>' + title + '</h3>' +
        '<input id="modal-input" type="text" maxlength="40" value="' + val + '" placeholder="入力してください" />' +
        '<div class="modal-actions">' +
          '<button class="btn" data-action="modal-cancel">キャンセル</button>' +
          '<button class="btn primary" data-action="modal-save">保存</button>' +
        '</div>' +
        (showClear ? '<button class="btn-text" data-action="modal-clear">この項目を削除</button>' : '') +
      '</div>' +
    '</div>';
  }

  function render(){
    var activeCat = getActiveCat();
    var html = renderHeader() + renderScopeTabs() + renderStats(activeScope) +
      renderCategoryTabs() +
      (activeCat ? renderBoard(activeScope, activeCat) : '<div class="empty-cats">カテゴリがありません</div>') +
      renderCategoryList(activeScope) +
      renderModal();
    document.getElementById('app').innerHTML = html;
    if (editing){
      if (editing.type==='cat-manage'){
        var addInp = document.getElementById('new-cat-input');
        if (addInp) addInp.focus();
      } else {
        var inp = document.getElementById('modal-input');
        if (inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
      }
    }
  }

  function openEditor(target){ editing = target; render(); }
  function saveEditor(){
    var inp = document.getElementById('modal-input');
    var val = inp ? inp.value.trim().slice(0,40) : '';
    var d = getCatData(activeScope, editing.cat);
    if (editing.type==='goal') d.goal = val;
    else if (editing.type==='item'){
      var had = d.items[editing.idx] && d.items[editing.idx].trim();
      d.items[editing.idx] = val;
      if (!val && had) d.done[editing.idx] = false;
    }
    persist(); editing = null; render();
  }
  function clearEditor(){
    var d = getCatData(activeScope, editing.cat);
    if (editing.type==='goal') d.goal = '';
    else if (editing.type==='item'){ d.items[editing.idx] = ''; d.done[editing.idx] = false; }
    persist(); editing = null; render();
  }
  function commitCatRenamesFromDOM(){
    var inputs = document.querySelectorAll('[data-cat-input]');
    inputs.forEach(function(inp){
      var id = inp.getAttribute('data-cat-input');
      var name = inp.value.trim().slice(0,10);
      var cat = getScopeCategories(activeScope).filter(function(c){ return c.id===id; })[0];
      if (cat && name) cat.name = name;
    });
    persist();
  }
  function doAddCategoryFromInput(inputEl){
    commitCatRenamesFromDOM();
    var name = inputEl ? inputEl.value.trim().slice(0,10) : '';
    if (name) addCategory(name);
    render();
  }

  function spawnStamp(text, size){
    var fx = document.getElementById('fx-layer');
    var el = document.createElement('div');
    el.className = 'stamp-pop ' + size + (reduceMotion ? ' reduced' : '');
    el.textContent = text;
    fx.appendChild(el);
    var holdMs = size==='grand' ? 1700 : 1100;
    var removeMs = size==='grand' ? 2200 : 1550;
    setTimeout(function(){ el.classList.add('fadeout'); }, holdMs);
    setTimeout(function(){ el.remove(); }, removeMs);
  }
  function spawnConfetti(n){
    if (reduceMotion) return;
    var fx = document.getElementById('fx-layer');
    var colors = ['#2563eb','#16a34a','#9db8e8'];
    for (var i=0;i<n;i++){
      var el = document.createElement('div');
      el.className = 'confetti';
      var left = Math.random()*100;
      var fallY = 70+Math.random()*30;
      var rot = (Math.random()*720-360);
      var dur = 1.1+Math.random()*0.9;
      var delay = Math.random()*0.15;
      el.style.left = left+'vw';
      el.style.background = colors[i%3];
      el.style.setProperty('--fall-y', fallY+'vh');
      el.style.setProperty('--rot', rot+'deg');
      el.style.animationDuration = dur+'s';
      el.style.animationDelay = delay+'s';
      fx.appendChild(el);
      setTimeout(function(node){ return function(){ node.remove(); }; }(el), (dur+delay+0.2)*1000);
    }
  }
  function celebrateLine(){ spawnStamp('ライン達成','small'); spawnConfetti(18); }
  function celebrateCategory(){ spawnStamp('目標達成','big'); spawnConfetti(34); }
  function celebrateAll(){ spawnStamp('全カテゴリ達成','grand'); spawnConfetti(60); }

  function toggleItem(catId, idx){
    var d = getCatData(activeScope, catId);
    var beforeLines = countLines(achievedMapFromData(d));
    var beforeFull = catFullyDone(d);

    d.done[idx] = !d.done[idx];

    var afterLines = countLines(achievedMapFromData(d));
    var afterFull = catFullyDone(d);

    persist();
    render();

    if (d.done[idx]){
      if (afterFull && !beforeFull){
        celebrateCategory();
        var allDone = getScopeCategories(activeScope).every(function(c){ return catFullyDone(getCatData(activeScope, c.id)); });
        if (allDone) setTimeout(celebrateAll, 650);
      } else if (afterLines > beforeLines){
        celebrateLine();
      }
    }
  }

  function handleClick(e){
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.dataset.action;

    if (action==='switch-scope'){ activeScope = el.dataset.scope; render(); }
    else if (action==='switch-cat'){ activeCatByScope[activeScope] = el.dataset.cat; render(); }
    else if (action==='edit-goal'){ openEditor({type:'goal', cat: el.dataset.cat}); }
    else if (action==='item-cell'){
      var catId = el.dataset.cat, idx = parseInt(el.dataset.idx,10);
      var d = getCatData(activeScope, catId);
      if (!d.items[idx] || !d.items[idx].trim()) openEditor({type:'item', cat:catId, idx:idx});
      else toggleItem(catId, idx);
    }
    else if (action==='edit-item'){ openEditor({type:'item', cat: el.dataset.cat, idx: parseInt(el.dataset.idx,10)}); }
    else if (action==='open-cat-manage'){ editing = {type:'cat-manage'}; render(); }
    else if (action==='add-cat'){ doAddCategoryFromInput(document.getElementById('new-cat-input')); }
    else if (action==='delete-cat'){ commitCatRenamesFromDOM(); deleteCategory(el.dataset.cat); render(); }
    else if (action==='cat-manage-done'){ commitCatRenamesFromDOM(); editing = null; render(); }
    else if (action==='modal-cancel'){ editing = null; render(); }
    else if (action==='modal-save'){ saveEditor(); }
    else if (action==='modal-clear'){ clearEditor(); }
  }

  document.addEventListener('click', handleClick);
  document.addEventListener('keydown', function(e){
    if (!editing) return;
    if (editing.type==='cat-manage'){
      if (e.key==='Enter' && e.target && e.target.id==='new-cat-input'){
        e.preventDefault();
        doAddCategoryFromInput(e.target);
      }
      return;
    }
    if (e.key==='Enter') saveEditor();
    else if (e.key==='Escape'){ editing = null; render(); }
  });

  async function init(){
    await loadState();
    render();
  }
  init();
})();
